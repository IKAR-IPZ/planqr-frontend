services:
  db:
    image: postgres:15-alpine
    container_name: planqr_postgres
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=planqr_db
    ports:
      - "9099:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./planqr-frontend
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL}
      ZUT_SCHEDULE_STUDENT_URL: ${ZUT_SCHEDULE_STUDENT_URL}
      ZUT_SCHEDULE_URL: ${ZUT_SCHEDULE_URL}
      ZUT_PLAN_BASE_URL: ${ZUT_PLAN_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-443}:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
