services:
  db:
    image: postgres:15-alpine
    container_name: planqr_postgres
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=planqr_db
    ports:
      - "9099:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: